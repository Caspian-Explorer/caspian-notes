name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test
      # Fail only on production-dependency vulnerabilities at HIGH+ severity.
      # Dev-only issues are surfaced via `npm audit` locally but don't block CI.
      - run: npm audit --audit-level=high --omit=dev
